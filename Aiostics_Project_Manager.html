  <style>
    :root{--app-font:'Inter',system-ui,sans-serif;--app-font-scale:1.04}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;overflow:hidden}
    body{background:#010409;font-family:var(--app-font);font-size:calc(13px * var(--app-font-scale))}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:#0d1117}
    ::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:#58606a}
    input,button,textarea{font-family:inherit}
    .node-row:hover{background:rgba(255,255,255,0.04)!important}
    .node-row:hover .act{opacity:1!important}
    .node-row:hover .hint{opacity:1!important}
    input[type=date]{color-scheme:dark}
    .node-row.selected{background:rgba(56,139,253,.09)!important;outline:1px solid rgba(56,139,253,.22);outline-offset:-1px;border-radius:5px}
    .node-row.drag-over{outline:2px dashed #388bfd88;outline-offset:-2px;border-radius:5px}
    .node-row.kbd-focus{background:rgba(56,139,253,.06)!important;outline:1px solid rgba(56,139,253,.35);outline-offset:-1px;border-radius:5px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fadein{animation:fadeIn .22s ease forwards}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
    .dirty-dot{animation:pulse 2s ease-in-out infinite}
    .tag-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.06em;white-space:nowrap}
    .proj-tab{display:flex;align-items:center;gap:7px;padding:0 16px;height:36px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .15s;user-select:none}
    .proj-tab:hover{background:rgba(255,255,255,.04)}
    .proj-tab.active{border-bottom-color:#388bfd;background:rgba(56,139,253,.08)}

const parseD=s=>s?new Date(s+'T00:00:00'):null;
const fmtD=d=>{const z=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;};
const shortD=s=>{if(!s)return null;return parseD(s).toLocaleDateString('en',{month:'short',day:'numeric'});};
const todayStr=()=>fmtD(new Date());

// ─── TREE UTILS ───────────────────────────────────────────────────────────────
function computeStatus(node){
  if(node.type==='file')return node.status||'new';
  const ch=node.children||[];
  if(!ch.length)return 'new';
  const ss=ch.map(computeStatus);
  if(ss.every(s=>s==='new'))return 'new';
  if(ss.every(s=>s==='completed'))return 'completed';
  if(ss.every(s=>s==='review'||s==='completed'))return 'review';
  return 'in-progress';
}
function computeDates(node){
  if(node.type==='file')return{start:node.startDate||null,end:node.endDate||null};
  const ch=(node.children||[]).map(computeDates);
  const starts=ch.map(c=>c.start).filter(Boolean).sort();
  const ends=ch.map(c=>c.end).filter(Boolean).sort();
  return{start:starts.length?starts[0]:null,end:ends.length?ends[ends.length-1]:null};
}
function gatherStats(root){
  const r={files:0,folders:0,new:0,'in-progress':0,review:0,completed:0};
  function walk(n,isRoot){
    if(n.type==='folder'){if(!isRoot)r.folders++;(n.children||[]).forEach(c=>walk(c,false));}
    else{r.files++;r[n.status||'new']++;}
  }
  walk(root,true);return r;
}
function folderFileStats(node){
  const r={new:0,'in-progress':0,review:0,completed:0,total:0};
  function walk(n){
    if(n.type==='file'){r[n.status||'new']++;r.total++;}
    else{(n.children||[]).forEach(walk);}
  }
  (node.children||[]).forEach(walk);
  return r;
}
function flattenForGantt(node,depth=0,arr=[]){
  const d=computeDates(node);
  arr.push({...node,depth,gStart:d.start,gEnd:d.end,gStatus:computeStatus(node)});
  if(node.type==='folder'&&node.children)node.children.forEach(c=>flattenForGantt(c,depth+1,arr));
  return arr;
}
function collectAllFolderIds(node,ids=new Set()){
  if(node.type==='folder'){ids.add(node.id);(node.children||[]).forEach(c=>collectAllFolderIds(c,ids));}
  return ids;
}
function flattenVisible(node,expanded,arr=[]){
  arr.push(node.id);
  if(node.type==='folder'&&(expanded.has(node.id)||node._isRoot)){
    (node.children||[]).forEach(c=>flattenVisible(c,expanded,arr));
  }
  return arr;
}
function searchTree(node,q){
  if(!q)return true;
  const lq=q.toLowerCase();
  if(node.name.toLowerCase().includes(lq)||(node.desc||'').toLowerCase().includes(lq)||
     (node.fileType||'').toLowerCase().includes(lq)||(node.tags||[]).some(t=>t.includes(lq)))return true;
  if(node.type==='folder')return(node.children||[]).some(c=>searchTree(c,lq));
  return false;
}
function gatherAllTags(node,tags=new Set()){
  (node.tags||[]).forEach(t=>tags.add(t));
  (node.children||[]).forEach(c=>gatherAllTags(c,tags));
  return tags;
}
const insertNode=(root,pid,item)=>
  root.id===pid?{...root,children:[...(root.children||[]),item]}
               :{...root,children:(root.children||[]).map(c=>insertNode(c,pid,item))};
const removeNode=(root,id)=>({...root,children:(root.children||[]).filter(c=>c.id!==id).map(c=>c.type==='folder'?removeNode(c,id):c)});
const patchNode=(root,id,ch)=>
  root.id===id?{...root,...ch}:{...root,children:(root.children||[]).map(c=>patchNode(c,id,ch))};
function reorderNode(root,parentId,fromIdx,toIdx){
  if(root.id===parentId){const ch=[...(root.children||[])];const[item]=ch.splice(fromIdx,1);ch.splice(toIdx,0,item);return{...root,children:ch};}
  return{...root,children:(root.children||[]).map(c=>reorderNode(c,parentId,fromIdx,toIdx))};
}
function findNode(root,id){
  if(root.id===id)return root;
  for(const ch of(root.children||[])){const r=findNode(ch,id);if(r)return r;}
  return null;
}
function findParent(root,childId){
  for(const ch of(root.children||[])){
    if(ch.id===childId)return root;
    const r=findParent(ch,childId);if(r)return r;
  }
  return null;
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function buildTreeExport(node,prefix='',isLast=true,isRoot=false){
  const isFolder=node.type==='folder';
  const status=isFolder?computeStatus(node):(node.status||'new');
  const statusEmoji={'new':'N','in-progress':'IP','review':'R','completed':'D'}[status]||'?';
  const name=isFolder?(isRoot?node.name:node.name+'/'):`${node.name}${node.fileType?'.'+node.fileType:''}`;
  const icon=isFolder?'📁':'📄';
  const desc=node.desc?`  # ${statusEmoji} ${S[status]?.label} - ${node.desc}`:`  # ${statusEmoji} ${S[status]?.label}`;
  const tags=(node.tags||[]).length?`  [${node.tags.join(', ')}]`:'';
  let lines=[];
  if(isRoot){lines.push(`${icon} ${name}\\`);}
  else{const conn=isLast?'└── ':'├── ';lines.push(`${prefix}${conn}${icon} ${name}${tags}${desc}`);}
  if(isFolder&&node.children?.length){
    const cp=isRoot?'':prefix+(isLast?'    ':'│   ');
    node.children.forEach((ch,i)=>lines.push(...buildTreeExport(ch,cp,i===node.children.length-1,false)));
  }
  return lines;
}

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function Sparkline({history,pct}){
  if(!history||history.length<2)return(
    <div style={{fontSize:10,color:'#8b949e',textAlign:'center',paddingTop:4,fontStyle:'italic',letterSpacing:'.03em'}}>progress over time</div>
  );
  const pts=history.slice(-20);
  const W=80,H=20;
  const minV=0,maxV=100;
  const x=(i)=>Math.round(i/(pts.length-1)*W);
  const y=(v)=>Math.round(H-(v-minV)/(maxV-minV)*H);
  const d=pts.map((p,i)=>`${i===0?'M':'L'}${x(i)},${y(p.pct)}`).join(' ');
  const col=pct===100?'#4ade80':pct>60?'#e3b341':'#388bfd';
  return(
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{display:'block',overflow:'visible'}}>
      <defs>
        <linearGradient id="spk" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={col} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={col} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={`${d} L${W},${H} L0,${H} Z`} fill="url(#spk)"/>
      <path d={d} fill="none" stroke={col} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={x(pts.length-1)} cy={y(pts[pts.length-1].pct)} r="2.5" fill={col}/>
    </svg>
  );
}

          <div className="act" style={{display:'flex',gap:3,marginLeft:2,flexShrink:0,opacity:isRoot?1:0,transition:'opacity .15s'}}>

            {isFolder&&(

          <div style={{flex:1}}/>

        <div style={{position:'relative'}}>
          <div style={{position:'absolute',left:pad+6,top:0,bottom:addingTo===node.id?10:4,width:1,background:'#1c2128',pointerEvents:'none'}}/>

            <TreeNode key={ch.id} node={ch} depth={depth+1} isRoot={false}
              expanded={expanded} onToggle={onToggle} onDelete={onDelete}
              onCycleStatus={onCycleStatus} onPatch={onPatch}
              addingTo={addingTo} setAddingTo={setAddingTo} onAdd={onAdd}
              selected={selected} onSelect={onSelect} searchQ={searchQ} tagFilter={tagFilter}
              dragState={dragState} onDragStart={onDragStart} onDragOver={onDragOver}
              onDragEnd={onDragEnd} onDrop={onDrop}
              parentId={node.id} siblingIndex={i}

// ─── GANTT CHART (with draggable bars) ────────────────────────────────────────
const ROW_H=32,HDR_H=36,NAME_W=240;
function GanttChart({tree,onPatchNode}){
  const rows=useMemo(()=>flattenForGantt(tree),[tree]);
  const [drag,setDrag]=useState(null); // {id,type,startX,origStart,origEnd,pxPerDay}
  const containerRef=useRef();

  const allDates=rows.flatMap(r=>[r.gStart,r.gEnd].filter(Boolean)).sort();
  const namesRef=useRef();

  if(!allDates.length)return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14}}>
      <div style={{fontSize:40}}>📅</div>
      <div style={{fontSize:14,fontWeight:700,color:'#adbac7'}}>No dates set yet</div>
      <div style={{fontSize:11,color:'#adbac7',textAlign:'center',maxWidth:340,lineHeight:2}}>
        Hover any file in Tree view and click <span style={{color:'#388bfd',background:'rgba(56,139,253,.15)',padding:'1px 7px',borderRadius:3,margin:'0 4px'}}>+ start</span> and <span style={{color:'#a78bfa',background:'rgba(167,139,250,.15)',padding:'1px 7px',borderRadius:3,margin:'0 4px'}}>+ end</span> to set dates.
      </div>
    </div>
  );

  const minD=parseD(allDates[0]);const maxD=parseD(allDates[allDates.length-1]);
  minD.setDate(minD.getDate()-3);maxD.setDate(maxD.getDate()+7);
  const totalDays=Math.ceil((maxD-minD)/86400000);
  const pxPerDay=Math.max(3,Math.min(30,Math.round(1100/totalDays)));
  const totalW=Math.ceil(totalDays*pxPerDay);
  const dayX=s=>s?Math.round((parseD(s)-minD)/86400000*pxPerDay):null;
  const xToDate=px=>fmtD(new Date(minD.getTime()+Math.round(px/pxPerDay)*86400000));
  const todayX=dayX(todayStr());
  const months=[];let mc=new Date(minD.getFullYear(),minD.getMonth(),1);
  while(mc<=maxD){months.push({label:mc.toLocaleDateString('en',{month:'short',year:'2-digit'}),x:dayX(fmtD(mc))});mc=new Date(mc.getFullYear(),mc.getMonth()+1,1);}

  const syncScroll=e=>{if(namesRef.current)namesRef.current.scrollTop=e.target.scrollTop;};

  // Drag handlers
  const onBarMouseDown=(e,row,type)=>{
    if(row.type==='folder')return;
    e.preventDefault();e.stopPropagation();
    setDrag({id:row.id,type,startX:e.clientX,origStart:row.gStart,origEnd:row.gEnd,pxPerDay});
  };
  const onMouseMove=useCallback(e=>{
    if(!drag)return;
    const dx=e.clientX-drag.startX;
    const days=Math.round(dx/drag.pxPerDay);
    if(days===0)return;
    let ns=drag.origStart,ne=drag.origEnd;
    if(drag.type==='bar'){ns=addDays(drag.origStart,days);ne=addDays(drag.origEnd,days);}
    else if(drag.type==='left'){ns=addDays(drag.origStart,days);if(parseD(ns)>=parseD(ne))ns=addDays(ne,-1);}
    else if(drag.type==='right'){ne=addDays(drag.origEnd,days);if(parseD(ne)<=parseD(ns))ne=addDays(ns,1);}
    setDrag(d=>({...d,_previewStart:ns,_previewEnd:ne}));
  },[drag]);
  const onMouseUp=useCallback(()=>{
    if(!drag)return;
    if(drag._previewStart||drag._previewEnd){
      onPatchNode(drag.id,{startDate:drag._previewStart||drag.origStart,endDate:drag._previewEnd||drag.origEnd});
    }
    setDrag(null);
  },[drag,onPatchNode]);

  useEffect(()=>{
    if(drag){
      window.addEventListener('mousemove',onMouseMove);
      window.addEventListener('mouseup',onMouseUp);
    }
    return()=>{window.removeEventListener('mousemove',onMouseMove);window.removeEventListener('mouseup',onMouseUp);};
  },[drag,onMouseMove,onMouseUp]);

  return(
    <div style={{display:'flex',height:'100%',overflow:'hidden'}} ref={containerRef}>
      <div style={{width:NAME_W,flexShrink:0,borderRight:'1px solid #21262d',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{height:HDR_H,flexShrink:0,background:'#010409',borderBottom:'1px solid #21262d',display:'flex',alignItems:'center',paddingLeft:12,fontSize:10,color:'#8b949e',letterSpacing:'.07em',textTransform:'uppercase'}}>
          Task / File
          <span style={{marginLeft:'auto',marginRight:10,fontSize:8,color:'#adbac7',fontStyle:'italic'}}>drag bars to adjust</span>
        </div>
        <div ref={namesRef} style={{flex:1,overflowY:'hidden',overflowX:'hidden'}}>
          {rows.map(row=>{const col=S[row.gStatus]?.color||'#8b949e';const isF=row.type==='folder';return(
            <div key={row.id} style={{height:ROW_H,display:'flex',alignItems:'center',paddingLeft:8+row.depth*14,gap:5,borderBottom:'1px solid #161b22',overflow:'hidden',background:isF?'rgba(255,255,255,.01)':'transparent'}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:col,flexShrink:0,boxShadow:row.gStart?`0 0 5px ${col}88`:'none'}}/>
              <span style={{fontSize:11,color:row.depth===0?'#f0f6fc':'#cdd5e0',fontWeight:isF?700:400,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>
                {row.name}{!isF&&row.fileType?`.${row.fileType}`:''}
              </span>
              {row.gStart&&row.gEnd&&<span style={{fontSize:9,color:'#8b949e',paddingRight:6,flexShrink:0}}>{Math.round((parseD(row.gEnd)-parseD(row.gStart))/86400000)+1}d</span>}
            </div>
          );})}
        </div>
      </div>
      <div onScroll={syncScroll} style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',cursor:drag?'grabbing':'default'}}>
        <div style={{minWidth:totalW+32,position:'relative',flex:1}}>
          <div style={{height:HDR_H,background:'#010409',borderBottom:'1px solid #21262d',position:'sticky',top:0,zIndex:10,overflow:'hidden'}}>
            {months.map((m,i)=>(
              <React.Fragment key={i}>
                <div style={{position:'absolute',left:m.x+16,top:0,bottom:0,width:1,background:'#21262d'}}/>
                <div style={{position:'absolute',left:m.x+20,height:HDR_H,display:'flex',alignItems:'center',fontSize:9,color:'#8b949e',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',whiteSpace:'nowrap'}}>{m.label}</div>
              </React.Fragment>
            ))}
          </div>
          {rows.map((row,ri)=>{
            const col=S[row.gStatus]?.color||'#8b949e';const isF=row.type==='folder';
            let gStart=row.gStart,gEnd=row.gEnd;
            if(drag&&drag.id===row.id){gStart=drag._previewStart||gStart;gEnd=drag._previewEnd||gEnd;}
            const sx=gStart?dayX(gStart):null;const ex=gEnd?dayX(gEnd):null;
            const barW=sx!==null&&ex!==null?Math.max(pxPerDay,ex-sx+pxPerDay):0;
            const isDragging=drag?.id===row.id;
            return(
              <div key={row.id} style={{height:ROW_H,borderBottom:'1px solid #161b22',position:'relative',background:ri%2===0?'transparent':'rgba(255,255,255,.005)'}}>
                {months.map((m,i)=>(<div key={i} style={{position:'absolute',left:m.x+16,top:0,bottom:0,width:1,background:'#1c2128',pointerEvents:'none'}}/>))}
                {sx!==null&&barW>0&&(
                  <div className={`gantt-bar${isDragging?' dragging':''}`}
                    title={`${row.name}\n${shortD(gStart)} → ${shortD(gEnd)||'?'}\n${isF?'':'Drag to move, edges to resize'}`}
                    onMouseDown={!isF?e=>onBarMouseDown(e,{...row,gStart,gEnd},'bar'):undefined}
                    style={{position:'absolute',left:sx+16,top:isF?6:8,height:isF?ROW_H-12:ROW_H-16,width:barW,
                      background:isF?`${col}22`:`${col}38`,border:`1px solid ${col}${isF?'55':'88'}`,
                      borderRadius:isF?3:4,display:'flex',alignItems:'center',paddingLeft:6,overflow:'hidden',
                      boxShadow:isDragging?`0 4px 16px ${col}55`:isF?'none':`0 1px 6px ${col}2a`}}>
                    {!isF&&<>
                      <div className="gantt-resize-l" onMouseDown={e=>{e.stopPropagation();onBarMouseDown(e,{...row,gStart,gEnd},'left');}} style={{background:'transparent'}}/>
                      <div className="gantt-resize-r" onMouseDown={e=>{e.stopPropagation();onBarMouseDown(e,{...row,gStart,gEnd},'right');}} style={{background:'transparent'}}/>
                    </>}
                    <span style={{fontSize:isF?8:9,color:col,fontWeight:isF?700:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',opacity:.9,pointerEvents:'none'}}>{row.name}</span>
                    {isDragging&&gStart&&<span style={{fontSize:8,color:col,opacity:.7,marginLeft:6,pointerEvents:'none',whiteSpace:'nowrap'}}>{shortD(gStart)} → {shortD(gEnd)}</span>}
                  </div>
                )}
                {sx===null&&<div style={{position:'absolute',left:20,top:'50%',transform:'translateY(-50%)',fontSize:8,color:'#1c2128',fontStyle:'italic'}}>-</div>}
              </div>
            );
          })}
          {todayX!==null&&todayX>=0&&todayX<=totalW&&(
            <div style={{position:'absolute',left:todayX+16,top:0,bottom:0,width:1,background:'rgba(248,81,73,.45)',pointerEvents:'none',zIndex:6}}>
              <div style={{position:'sticky',top:HDR_H+3,fontSize:7,color:'#f85149',fontWeight:700,background:'rgba(248,81,73,.18)',border:'1px solid rgba(248,81,73,.35)',borderRadius:2,padding:'1px 4px',whiteSpace:'nowrap',marginLeft:3,display:'inline-block',letterSpacing:'.06em'}}>TODAY</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── EXPORT MODAL ─────────────────────────────────────────────────────────────
function ExportModal({tree,projectName,onClose}){
  const st=useMemo(()=>gatherStats(tree),[tree]);
  const text=useMemo(()=>{
    const h=[`# ${projectName}`,`# Exported: ${new Date().toLocaleString()}`,`# Files: ${st.files}  |  Folders: ${st.folders}  |  Done: ${st.completed}/${st.files}`,`#`,`# New  In Progress  Review  Done`,``];
    return[...h,...buildTreeExport(tree,'',true,true)].join('\n');
  },[tree,projectName,st]);
  const [copied,setCopied]=useState(false);const taRef=useRef();
  const copy=()=>{navigator.clipboard?.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2200)}).catch(()=>{taRef.current?.select();document.execCommand('copy');setCopied(true);setTimeout(()=>setCopied(false),2200);});};
  const download=()=>{const blob=new Blob([text],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${projectName.replace(/[^a-z0-9]/gi,'_')}_structure.txt`;a.click();};
  const exportPdf=()=>{
    const pct=st.files>0?Math.round(st.completed/st.files*100):0;
    const SCOL={'new':'#8b949e','in-progress':'#e3b341','review':'#c084fc','completed':'#4ade80'};
    const SLBL={'new':'New','in-progress':'In Progress','review':'Review','completed':'Done'};
    function nodeToHtml(node,depth,isRoot){
      const isFolder=node.type==='folder';
      const status=isFolder?computeStatus(node):(node.status||'new');
      const col=SCOL[status]||'#8b949e';
      const name=isFolder?(isRoot?node.name:node.name+'/'):(node.name+(node.fileType?'.'+node.fileType:''));
      const icon=isFolder?(isRoot?'◈':'📁'):'📄';
      const tags=(node.tags||[]).map(function(t){return '<span class="tag">'+t+'</span>';}).join('');
      const indent=depth*18;
      let h='<div class="node" style="padding-left:'+indent+'px">'
        +'<span class="icon">'+icon+'</span>'
        +'<span class="name '+(isFolder?'folder':'')+'">'+name+'</span>'
        +tags
        +'<span class="badge" style="background:'+col+'22;color:'+col+';border:1px solid '+col+'55">'+SLBL[status]+'</span>'
        +(node.desc?'<span class="desc">'+node.desc+'</span>':'')
        +'</div>';
      if(node.notes&&node.notes.trim())
        h+='<div class="notes" style="padding-left:'+(indent+22)+'px">'+node.notes.replace(/\n/g,'<br/>')+'</div>';
      if(isFolder&&node.children&&node.children.length)
        h+=node.children.map(function(ch){return nodeToHtml(ch,isRoot?0:depth+1,false);}).join('');
      return h;
    }
    const logoSrc=document.querySelector('link[rel=icon]')?.href||'';
    const statRows=['New','In Progress','Review','Done'].map(function(l,i){
      const k=['new','in-progress','review','completed'][i];
      const col=['#8b949e','#e3b341','#c084fc','#4ade80'][i];
      return '<div class="stat"><div class="stat-val" style="color:'+col+'">'+(st[k]||0)+'</div><div class="stat-label">'+l+'</div></div>';
    }).join('');
    const legendItems=['#8b949e','#e3b341','#c084fc','#4ade80'].map(function(c,i){
      return '<div class="legend-item"><div class="legend-dot" style="background:'+c+'"></div>'+['New','In Progress','Review','Done'][i]+'</div>';
    }).join('');
    const w=window.open('','_blank','width=900,height=700');
    if(!w){alert('Please allow popups for PDF export.');return;}
    const html=[
      '<!DOCTYPE html><html><head><meta charset="UTF-8"/>',
      '<title>'+projectName+' - Project Structure</title>',

// ─── PROJECT TABS ─────────────────────────────────────────────────────────────

        {projects.map(p=>{
          const active=p.id===activeId;
          const st=p.tree?gatherStats(p.tree):{files:0,completed:0};
          const pct=st.files>0?Math.round(st.completed/p.tree?gatherStats(p.tree).files:1*100):0;
          const realSt=p.tree?gatherStats(p.tree):{files:0,completed:0};

// ─── FONT SWITCHER ────────────────────────────────────────────────────────────
const FONTS=[
  {key:'inter',    label:'Inter',    family:"'Inter',system-ui,sans-serif",       scale:1},
  {key:'mono',     label:'Mono',     family:"'JetBrains Mono',Consolas,monospace", scale:0.92},
  {key:'antiqua',  label:'Antiqua',  family:"'Book Antiqua','Palatino Linotype',serif", scale:1.05},
  {key:'josefin',  label:'Josefin',  family:"'Josefin Sans',sans-serif",           scale:1},
];
const FONT_LS_KEY='aiostic_font';
function applyFont(key){
  const f=FONTS.find(x=>x.key===key)||FONTS[0];
  document.documentElement.style.setProperty('--app-font',f.family);
  document.documentElement.style.setProperty('--app-font-scale',f.scale);
  try{localStorage.setItem(FONT_LS_KEY,key);}catch(e){}
}

function FontSwitcher(){
  const [active,setActive]=useState(()=>{try{return localStorage.getItem(FONT_LS_KEY)||'inter';}catch{return 'inter';}});
  useEffect(()=>applyFont(active),[]);
  return(
    <select value={active} onChange={e=>{setActive(e.target.value);applyFont(e.target.value);}}
      title="Switch font"
      style={{background:'transparent',border:'none',color:'#adbac7',fontFamily:'inherit',fontSize:9,fontWeight:600,padding:'0 2px',cursor:'pointer',outline:'none',colorScheme:'dark'}}
      onMouseEnter={e=>e.currentTarget.style.borderColor='#388bfd55'}
      onMouseLeave={e=>e.currentTarget.style.borderColor='#21262d'}>
      {FONTS.map(f=><option key={f.key} value={f.key}>{f.label}</option>)}
    </select>
  );
}

// ─── COMPRESS / DECOMPRESS (URL sharing) ─────────────────────────────────────
async function compressProject(obj){
  const json=JSON.stringify(obj);
  const bytes=new TextEncoder().encode(json);
  const cs=new CompressionStream('deflate-raw');
  const writer=cs.writable.getWriter();
  writer.write(bytes);writer.close();
  const buf=await new Response(cs.readable).arrayBuffer();
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function decompressProject(b64){
  const bin=atob(b64.replace(/-/g,'+').replace(/_/g,'/'));
  const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
  const ds=new DecompressionStream('deflate-raw');
  const writer=ds.writable.getWriter();
  writer.write(bytes);writer.close();
  const buf=await new Response(ds.readable).arrayBuffer();
  return JSON.parse(new TextDecoder().decode(buf));
}

function ShareModal({tree,projectName,onClose}){
  const [url,setUrl]=useState('');
  const [loading,setLoading]=useState(true);
  const [copied,setCopied]=useState(false);
  const [err,setErr]=useState('');

  useEffect(()=>{
    compressProject({projectName,tree,sharedAt:new Date().toISOString()})
      .then(encoded=>{
        const base=window.location.href.split('#')[0];
        const full=`${base}#share=${encoded}`;
        if(full.length>200000){setErr('Project is too large to share via URL (>200KB). Export as a file instead.');setLoading(false);return;}
        setUrl(full);setLoading(false);
      })
      .catch(e=>{setErr('Could not generate link: '+e.message);setLoading(false);});
  },[]);

  const copy=()=>{
    navigator.clipboard?.writeText(url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);})
      .catch(()=>{const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),2500);});
  };

  const sizeKB=url?Math.round(url.length/1024):0;

  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}}

              ].map(([l,c])=>(
                <span key={l} style={{padding:'2px 10px',borderRadius:999,fontSize:9,fontWeight:700,color:c,background:`${c}18`,border:`1px solid ${c}33`}}>{l}</span>
              ))}
            </div>

            <div style={{background:'#010409',border:'1px solid #388bfd44',borderRadius:8,padding:'10px 14px',marginBottom:14,fontFamily:'inherit'}}>
              <div style={{fontSize:9,color:'#8b949e',marginBottom:5,letterSpacing:'.06em',textTransform:'uppercase'}}>Shareable URL</div>

              <ReadOnlyNode node={tree} depth={0} expanded={expanded} onToggle={toggle}/>
            </div>
          </div>
        ):(
          <GanttChart tree={tree} onPatchNode={()=>{}}/>
        )}
      </div>
      <div style={{padding:'5px 16px',borderTop:'1px solid #21262d',fontSize:10,color:'#adbac7',display:'flex',gap:14,flexShrink:0,alignItems:'center'}}>
        <span>Read-only shared view</span>
        <span style={{marginLeft:'auto'}}>Click "Open for editing" to work with this project</span>
      </div>
    </div>
  );
}



// ─── MINIMAP ──────────────────────────────────────────────────────────────────
function MinimapNode({node,depth,onJump,expanded}){
  const isFolder=node.type==='folder';
  const status=isFolder?computeStatus(node):(node.status||'new');
  const col=S[status]?.color||'#8b949e';
  const isOpen=depth===0||expanded.has(node.id);
  return(
    <div>
      <div onClick={()=>onJump(node.id)}
        style={{display:'flex',alignItems:'center',gap:3,paddingLeft:4+depth*8,paddingRight:4,height:14,cursor:'pointer',borderRadius:2,transition:'background .1s'}}
        onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.06)'}
        onMouseLeave={e=>e.currentTarget.style.background='transparent'}
        title={`${node.name}${!isFolder&&node.fileType?'.'+node.fileType:''}`}>
        <span style={{width:5,height:5,borderRadius:isFolder?1:'50%',background:col,flexShrink:0,opacity:isFolder?.7:1}}/>
        <span style={{fontSize:8,color:isFolder?'#cdd5e0':'#adbac7',fontWeight:isFolder?700:400,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,lineHeight:1}}>
          {node.name}{!isFolder&&node.fileType?'.'+node.fileType:''}
        </span>
      </div>
      {isFolder&&isOpen&&(node.children||[]).map(ch=>(
        <MinimapNode key={ch.id} node={ch} depth={depth+1} onJump={onJump} expanded={expanded}/>
      ))}
    </div>
  );
}

function Minimap({tree,expanded,onJump,onClose}){
  const st=useMemo(()=>gatherStats(tree),[tree]);
  const pct=st.files>0?Math.round(st.completed/st.files*100):0;
  const [search,setSearch]=useState('');
  function filterTree(node,q){
    if(!q)return node;
    const lq=q.toLowerCase();
    if(node.type==='file'){
      return node.name.toLowerCase().includes(lq)||(node.fileType||'').toLowerCase().includes(lq)?node:null;
    }
    const filteredChildren=(node.children||[]).map(c=>filterTree(c,lq)).filter(Boolean);
    if(filteredChildren.length||node.name.toLowerCase().includes(lq))return{...node,children:filteredChildren};
    return null;
  }
  const displayTree=search?filterTree(tree,search):tree;
  return(
    <div style={{width:200,flexShrink:0,borderLeft:'1px solid #21262d',background:'#0a0e14',display:'flex',flexDirection:'column',height:'100%',position:'relative'}}>
      {/* Header */}
      <div style={{padding:'8px 8px 6px',borderBottom:'1px solid #21262d',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:6}}>
          <span style={{fontSize:10,color:'#adbac7',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',flex:1}}>Map</span>
          <span style={{fontSize:9,color:'#8b949e',fontVariantNumeric:'tabular-nums'}}>{pct}%</span>
          <button onClick={onClose} title="Close minimap"
            style={{width:18,height:18,borderRadius:999,border:'1px solid #21262d',background:'transparent',color:'#8b949e',fontSize:10,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,lineHeight:1}}>✕</button>
        </div>
        {/* Mini progress bar */}
        <div style={{height:3,background:'#21262d',borderRadius:2,overflow:'hidden',marginBottom:6}}>
          <div style={{height:'100%',borderRadius:2,width:`${pct}%`,background:pct===100?'#4ade80':'linear-gradient(90deg,#1f6feb,#388bfd)'}}/>
        </div>
        {/* Status dots */}
        <div style={{display:'flex',gap:3,marginBottom:5,flexWrap:'wrap'}}>
          {STATUS_ORDER.map(k=>{
            const n=st[k]||0;if(!n)return null;
            const c=S[k];
            return(<span key={k} title={`${c.label}: ${n}`}
              style={{fontSize:8,color:c.color,background:c.bg,border:`1px solid ${c.border}`,borderRadius:999,padding:'0 5px',fontWeight:700}}>{n}</span>);
          })}
        </div>
        {/* Search */}
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Filter…"
          style={{width:'100%',background:'#161b22',border:'1px solid #30363d',color:'#cdd5e0',fontFamily:'inherit',fontSize:9,borderRadius:999,padding:'3px 8px',outline:'none',colorScheme:'dark'}}/>
      </div>
      {/* Tree */}
      <div style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:'4px 2px'}}>
        {displayTree
          ?<MinimapNode node={displayTree} depth={0} onJump={onJump} expanded={expanded}/>
          :<div style={{fontSize:9,color:'#8b949e',textAlign:'center',padding:'12px 8px',fontStyle:'italic'}}>No matches</div>
        }
      </div>
      {/* Footer */}
      <div style={{padding:'5px 8px',borderTop:'1px solid #21262d',fontSize:8,color:'#8b949e',flexShrink:0,textAlign:'center',letterSpacing:'.04em'}}>
        click node to scroll
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [projects,setProjects]   = useState([]);
  const [activeId,setActiveId]   = useState(null);
  const [showWelcome,setShowWelcome] = useState(true);
  const [lastProjects,setLastProjects] = useState([]);
  const [expanded,setExpanded]   = useState(new Set());
  const [addingTo,setAddingTo]   = useState(null);
  const [addingKind,setAddingKind] = useState('file');
  const [selected,setSelected]   = useState(new Set());
  const [searchQ,setSearchQ]     = useState('');
  const [tagFilter,setTagFilter] = useState(null);
  const [dragState,setDragState] = useState(null);
  const [view,setView]           = useState('tree');
  const [showExport,setShowExport] = useState(false);
  const [focusedId,setFocusedId] = useState(null);
  const [notesOpen,setNotesOpen] = useState(new Set());
  const [tourStep,setTourStep]   = useState(null);
  const [showShare,setShowShare] = useState(false);
  const [showShortcuts,setShowShortcuts] = useState(false);
  const [showMinimap,setShowMinimap]   = useState(false);
  const [sharedData,setSharedData] = useState(null); // set if URL has #share=
  const importRef = useRef();
  const treeRef   = useRef();

  // ── Derived active project ─────────────────────────────────────────────────
  const active        = projects.find(p=>p.id===activeId);
  const tree          = active?.tree||null;
  const projectName   = active?.projectName||'';
  const isDirty       = active?.isDirty||false;
  const fileHandle    = active?.fileHandle||null;
  const fileName      = active?.fileName||null;
  const projectType   = active?.projectType||'software';
  const PT            = PROJ_TYPES[projectType]||PROJ_TYPES.software;
  const historyStack  = active?.historyStack||[];
  const historyIdx    = active?.historyIdx??-1;
  const pHistory      = active?.pHistory||[];

  // ── Load localStorage ──────────────────────────────────────────────────────
  useEffect(()=>{
    try{
      const raw=localStorage.getItem(LS_KEY);
      if(!raw)return;
      const data=JSON.parse(raw);
      if(data.lastProjects?.length)setLastProjects(data.lastProjects);
      if(data.projects?.length){
        const restored=data.projects.map(p=>({...p,fileHandle:null,isDirty:false,
          historyStack:p.tree?[p.tree]:[],historyIdx:0}));
        setProjects(restored);
        const aid=data.activeId||restored[0].id;
        setActiveId(aid);
        const ap=restored.find(p=>p.id===aid);
        if(ap?.tree)setExpanded(new Set([ap.tree.id]));
        setShowWelcome(false);
      }
    }catch(e){}
    // Tour
    if(!localStorage.getItem(TOUR_KEY)&&!localStorage.getItem(LS_KEY)){
      // Will start after first project created
    }
    // Check for shared link
    const hash=window.location.hash;
    if(hash.startsWith('#share=')){
      const encoded=hash.slice(7);
      decompressProject(encoded)
        .then(data=>{setSharedData(data);setShowWelcome(false);})
        .catch(()=>alert('Could not decode shared link. It may be corrupted or truncated.'));
    }
  },[]);

  // ── Auto-save to localStorage ──────────────────────────────────────────────
  useEffect(()=>{
    if(projects.length===0)return;
    const toSave={
      activeId,
      projects:projects.map(p=>({id:p.id,projectName:p.projectName,tree:p.tree,savedAt:new Date().toISOString(),_stats:p.tree?gatherStats(p.tree):{},pHistory:p.pHistory||[]})),
      lastProjects:projects.map(p=>({id:p.id,projectName:p.projectName,savedAt:new Date().toISOString(),_stats:p.tree?gatherStats(p.tree):{}})),
    };
    try{localStorage.setItem(LS_KEY,JSON.stringify(toSave));}catch(e){}
  },[projects,activeId]);

  // ── Computed ───────────────────────────────────────────────────────────────
  const st      = useMemo(()=>tree?gatherStats(tree):null,[tree]);
  const allTags = useMemo(()=>tree?gatherAllTags(tree):new Set(),[tree]);
  const canUndo = historyIdx>0;
  const canRedo = historyIdx<historyStack.length-1;
  const undoCount = historyIdx;
  const redoCount = historyStack.length-1-historyIdx;

  // ── Helpers ────────────────────────────────────────────────────────────────
  const resetUIState=(newTree)=>{
    setAddingTo(null);setSelected(new Set());setSearchQ('');
    setTagFilter(null);setDragState(null);setView('tree');setFocusedId(null);setNotesOpen(new Set());
    if(newTree)setExpanded(new Set([newTree.id]));
  };

  const openProject=(projData,fh=null,fName=null)=>{
    const exists=projects.find(p=>p.projectName===projData.projectName&&!fh);
    if(exists){setActiveId(exists.id);resetUIState(exists.tree);setShowWelcome(false);return;}
    const newProj={id:uid(),projectName:projData.projectName,tree:projData.tree,projectType:projData.projectType||'software',fileHandle:fh,fileName:fName,isDirty:false,
      historyStack:[projData.tree],historyIdx:0,pHistory:projData.pHistory||[]};
    setProjects(p=>[...p,newProj]);
    setActiveId(newProj.id);
    resetUIState(projData.tree);
    setShowWelcome(false);
  };

  const switchProject=(id)=>{if(id===activeId)return;setActiveId(id);const p=projects.find(pr=>pr.id===id);resetUIState(p?.tree);};
  const closeProject=(id)=>{
    const p=projects.find(pr=>pr.id===id);
    if(p?.isDirty&&!window.confirm(`Close "${p.projectName}"? Unsaved changes will be lost.`))return;
    const remaining=projects.filter(pr=>pr.id!==id);
    setProjects(remaining);
    if(activeId===id){if(remaining.length>0){const next=remaining[remaining.length-1];setActiveId(next.id);resetUIState(next.tree);}else{setActiveId(null);setShowWelcome(true);}}
  };

  // ── Tree mutations (with history) ──────────────────────────────────────────
  const applyTree=(newTree)=>{
    const today=todayStr();
    setProjects(p=>p.map(pr=>{
      if(pr.id!==activeId)return pr;
      const st=gatherStats(newTree);
      const pct=st.files>0?Math.round(st.completed/st.files*100):0;
      const prevHistory=pr.historyStack||[];
      const prevIdx=pr.historyIdx??0;
      const newStack=[...prevHistory.slice(0,prevIdx+1),newTree].slice(-MAX_HISTORY);
      // Progress history: one entry per day
      const ph=[...(pr.pHistory||[])];
      const last=ph[ph.length-1];
      if(!last||last.date!==today)ph.push({date:today,pct});
      else ph[ph.length-1]={date:today,pct};
      return{...pr,tree:newTree,isDirty:true,historyStack:newStack,historyIdx:newStack.length-1,pHistory:ph};
    }));
  };

  const setTree=(fn)=>{
    if(!active)return;
    const newTree=typeof fn==='function'?fn(active.tree):fn;
    applyTree(newTree);
  };

  const jumpToNode=(id)=>{
    // Expand all ancestors so the node is visible
    function getAncestors(node,targetId,path=[]){
      if(node.id===targetId)return path;
      for(const ch of(node.children||[])){
        const r=getAncestors(ch,targetId,[...path,node.id]);
        if(r)return r;
      }
      return null;
    }
    const ancestors=getAncestors(tree,id,[]);
    if(ancestors){
      setExpanded(s=>{const n=new Set(s);ancestors.forEach(a=>n.add(a));return n;});
      setTimeout(()=>{
        const el=document.querySelector(`[data-nodeid="${id}"]`);
        if(el){el.scrollIntoView({behavior:'smooth',block:'center'});setFocusedId(id);}
      },60);
    }
  };
  const undo=()=>{
    if(!canUndo)return;
    setProjects(p=>p.map(pr=>{
      if(pr.id!==activeId)return pr;
      const newIdx=pr.historyIdx-1;
      return{...pr,tree:pr.historyStack[newIdx],historyIdx:newIdx,isDirty:true};
    }));
  };
  const redo=()=>{
    if(!canRedo)return;
    setProjects(p=>p.map(pr=>{
      if(pr.id!==activeId)return pr;
      const newIdx=pr.historyIdx+1;
      return{...pr,tree:pr.historyStack[newIdx],historyIdx:newIdx,isDirty:true};
    }));
  };

  // ── File ops ───────────────────────────────────────────────────────────────
  const writeToHandle=async(fh,data)=>{const w=await fh.createWritable();await w.write(data);await w.close();};
  const buildSaveData=()=>JSON.stringify({projectName,tree,pHistory},null,2);

  const handleSave=useCallback(async()=>{
    if(!tree)return;
    if(fileHandle){
      try{await writeToHandle(fileHandle,buildSaveData());setProjects(p=>p.map(pr=>pr.id===activeId?{...pr,isDirty:false}:pr));}
      catch(e){alert('Could not save: '+e.message);}
    }else{handleSaveAs();}
  },[tree,projectName,fileHandle,activeId,pHistory]);

  const handleSaveAs=useCallback(async()=>{
    if(!tree)return;
    const data=buildSaveData();
    if(window.showSaveFilePicker){
      try{
        const fh=await window.showSaveFilePicker({suggestedName:`${projectName.replace(/[^a-z0-9]/gi,'_')}_project.json`,types:[{description:'JSON Project',accept:{'application/json':['.json']}}],startIn:'documents'});
        await writeToHandle(fh,data);
        setProjects(p=>p.map(pr=>pr.id===activeId?{...pr,fileHandle:fh,fileName:fh.name,isDirty:false}:pr));
      }catch(e){if(e.name!=='AbortError')alert('Save failed: '+e.message);}
    }else{
      const blob=new Blob([data],{type:'application/json'});const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);a.download=`${projectName.replace(/[^a-z0-9]/gi,'_')}_project.json`;a.click();
      setProjects(p=>p.map(pr=>pr.id===activeId?{...pr,isDirty:false}:pr));
    }
  },[tree,projectName,activeId,pHistory]);

  const handleLoad=useCallback(async()=>{
    if(window.showOpenFilePicker){
      try{
        const[fh]=await window.showOpenFilePicker({types:[{description:'JSON Project',accept:{'application/json':['.json']}}]});
        const file=await fh.getFile();const text=await file.text();const d=JSON.parse(text);
        if(d.tree&&d.projectName)openProject(d,fh,fh.name);
        else alert('Invalid project file.');
      }catch(e){if(e.name!=='AbortError')alert('Could not load: '+e.message);}
    }else{importRef.current?.click();}
  },[projects]);

  const onFileFallback=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.tree&&d.projectName)openProject(d,null,f.name);else alert('Invalid file.');}catch{alert('Could not parse JSON.');}};
    r.readAsText(f);e.target.value='';
  };

  // ── Keyboard shortcuts ─────────────────────────────────────────────────────
  useEffect(()=>{
    const h=e=>{
      const tag=e.target.tagName;
      const inInput=tag==='INPUT'||tag==='TEXTAREA';
      if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();handleSave();return;}
      if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();return;}
      if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redo();return;}
      if(inInput||!tree)return;
      // Tree keyboard navigation
      const visible=flattenVisible({...tree,_isRoot:true},expanded);
      if(e.key==='ArrowDown'){
        e.preventDefault();
        const idx=focusedId?visible.indexOf(focusedId):-1;
        const next=visible[Math.min(idx+1,visible.length-1)];
        setFocusedId(next);
        document.querySelector(`[data-nodeid="${next}"]`)?.scrollIntoView({block:'nearest'});
      }
      if(e.key==='ArrowUp'){
        e.preventDefault();
        const idx=focusedId?visible.indexOf(focusedId):visible.length;
        const prev=visible[Math.max(idx-1,0)];
        setFocusedId(prev);
        document.querySelector(`[data-nodeid="${prev}"]`)?.scrollIntoView({block:'nearest'});
      }
      if(e.key==='ArrowRight'&&focusedId){setExpanded(s=>{const n=new Set(s);n.add(focusedId);return n;});}
      if(e.key==='ArrowLeft'&&focusedId){setExpanded(s=>{const n=new Set(s);n.delete(focusedId);return n;});}
      if(e.key==='e'||e.key==='E'){expandAll();}
      if(e.key==='m'||e.key==='M'){setShowMinimap(m=>!m);return;}
      if(e.key==='Escape'){
        if(addingTo){setAddingTo(null);return;}
        setFocusedId(null);setSelected(new Set());
      }
      if(e.key==='?'){setShowShortcuts(s=>!s);return;}
      // Add shortcuts - work on focused node
      if(focusedId){
        const node=findNode(tree,focusedId);
        if(!node)return;
        // Target folder: if focused is a file, add to its parent; if folder, add to it
        const targetId=node.type==='folder'?node.id:findParent(tree,focusedId)?.id;
        if(!targetId)return;
        if(e.key==='a'||e.key==='A'){
          e.preventDefault();
          setAddingKind('file');
          setAddingTo(targetId);
          setExpanded(s=>{const n=new Set(s);n.add(targetId);return n;});
          setTimeout(()=>document.querySelector(`[data-nodeid="${targetId}"] input`)?.focus(),80);
        }
        if(e.key==='f'||e.key==='F'){
          e.preventDefault();
          setAddingKind('file');
          setAddingTo(targetId);
          setExpanded(s=>{const n=new Set(s);n.add(targetId);return n;});
        }
        if(e.key==='s'||e.key==='S'){
          e.preventDefault();
          setAddingKind('folder');
          setAddingTo(targetId);
          setExpanded(s=>{const n=new Set(s);n.add(targetId);return n;});
        }
      }
    };
    document.addEventListener('keydown',h);
    return()=>document.removeEventListener('keydown',h);
  },[handleSave,undo,redo,tree,expanded,focusedId,addingTo,addingKind]);

  // ── Shared view ───────────────────────────────────────────────────────────────
  if(sharedData)return(
    <SharedView data={sharedData} onEdit={()=>{
      openProject(sharedData);
      setSharedData(null);
      // Clear hash from URL without reload
      history.replaceState(null,'',window.location.pathname+window.location.search);
    }}/>
  );

  // ── Welcome screen ─────────────────────────────────────────────────────────
  if(showWelcome||projects.length===0)return(
    <>
      <input type="file" accept=".json" ref={importRef} onChange={onFileFallback} style={{display:'none'}}/>
      <Welcome lastProjects={lastProjects}
        onNew={(n,d,pt)=>{
          const root={id:uid(),name:n,desc:d,type:'folder',children:[],tags:[]};
          openProject({projectName:n,tree:root,projectType:pt||'software'});
          if(!localStorage.getItem(TOUR_KEY)){setTourStep(0);}
        }}
        onLoad={handleLoad}
        onResume={p=>openProject(p)}
        onTemplate={t=>{
          const tr=makeTemplate(t);tr.name=t.name.toLowerCase().replace(/\s+/g,'-');
          openProject({projectName:t.name,tree:tr,projectType:'software'});
          if(!localStorage.getItem(TOUR_KEY)){setTourStep(0);}
        }}
      />
      {tourStep!==null&&(
        <TourOverlay step={tourStep}
          onNext={()=>{
            if(tourStep>=TOUR_STEPS.length-1){setTourStep(null);localStorage.setItem(TOUR_KEY,'1');}
            else setTourStep(s=>s+1);
          }}
          onSkip={()=>{setTourStep(null);localStorage.setItem(TOUR_KEY,'1');}}
        />
      )}
    </>
  );

  // ── Tree ops ───────────────────────────────────────────────────────────────
  const toggle=id=>setExpanded(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;});
  const cycleStatus=(id,cur)=>{const next=STATUS_ORDER[(STATUS_ORDER.indexOf(cur)+1)%STATUS_ORDER.length];setTree(p=>patchNode(p,id,{status:next}));};
  const patch=(id,ch)=>setTree(p=>patchNode(p,id,ch));
  const del=id=>{setTree(p=>removeNode(p,id));setSelected(s=>{const n=new Set(s);n.delete(id);return n;});if(focusedId===id)setFocusedId(null);};
  const add=(parentId,{kind,name,ext,desc,startDate,endDate})=>{
    const item=kind==='folder'?{id:uid(),name,desc,type:'folder',children:[],tags:[]}:{id:uid(),name,desc,type:'file',fileType:ext||'',status:'new',startDate:startDate||null,endDate:endDate||null,tags:[],notes:''};
    setTree(p=>insertNode(p,parentId,item));
    setExpanded(p=>new Set([...p,parentId]));setAddingTo(null);
  };
  const handleSelect=(id,multi)=>setSelected(prev=>{if(multi){const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;}if(prev.size===1&&prev.has(id))return new Set();return new Set([id]);});
  const bulkStatus=status=>{setTree(p=>{let t=p;selected.forEach(id=>{t=patchNode(t,id,{status});});return t;});};
  const bulkDelete=()=>{if(window.confirm(`Delete ${selected.size} selected items?`)){setTree(p=>{let t=p;selected.forEach(id=>{t=removeNode(t,id);});return t;});setSelected(new Set());}};
  const expandAll=()=>setExpanded(collectAllFolderIds(tree));
  const collapseAll=()=>setExpanded(new Set([tree.id]));
  const handleDragStart=(e,id,parentId,idx)=>{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',JSON.stringify({id,parentId,idx}));setDragState({draggingId:id,overId:null});};
  const handleDragOver=(e,id)=>{e.preventDefault();e.dataTransfer.dropEffect='move';setDragState(d=>d?{...d,overId:id}:d);};
  const handleDragEnd=()=>setDragState(null);
  const handleDrop=(e,targetId,targetParentId,targetIdx)=>{e.preventDefault();try{const{id:srcId,parentId:srcParentId,idx:srcIdx}=JSON.parse(e.dataTransfer.getData('text/plain'));if(srcId===targetId||srcParentId!==targetParentId)return;setTree(p=>reorderNode(p,srcParentId,srcIdx,targetIdx));}catch(err){}setDragState(null);};
  const toggleNotes=id=>setNotesOpen(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:'#0d1117',color:'#cdd5e0',overflow:'hidden'}}>
      <input type="file" accept=".json" ref={importRef} onChange={onFileFallback} style={{display:'none'}}/>
      {showExport&&<ExportModal tree={tree} projectName={projectName} onClose={()=>setShowExport(false)}/>}
      {showShortcuts&&<ShortcutsModal onClose={()=>setShowShortcuts(false)}/>}
      {showShare&&<ShareModal tree={tree} projectName={projectName} onClose={()=>setShowShare(false)}/>}
      {tourStep!==null&&(
        <TourOverlay step={tourStep}
          onNext={()=>{if(tourStep>=TOUR_STEPS.length-1){setTourStep(null);localStorage.setItem(TOUR_KEY,'1');}else setTourStep(s=>s+1);}}
          onSkip={()=>{setTourStep(null);localStorage.setItem(TOUR_KEY,'1');}}
        />
      )}
      <ProjectTabs projects={projects} activeId={activeId} onSwitch={switchProject} onClose={closeProject}
        onNewProject={()=>setShowWelcome(true)} onLoadProject={handleLoad}
        onShowShortcuts={()=>setShowShortcuts(true)}
        onStartTour={()=>setTourStep(0)}/>
      <Dashboard
        st={st} name={projectName} isDirty={isDirty} fileName={fileName} PT={PT}
        view={view} setView={setView} treeView={view==='tree'}
        onSave={handleSave} onSaveAs={handleSaveAs}
        onExportTree={()=>setShowExport(true)}
        onShare={()=>setShowShare(true)}
        onExpandAll={expandAll} onCollapseAll={collapseAll}
        searchQ={searchQ} setSearchQ={setSearchQ}
        tagFilter={tagFilter} setTagFilter={setTagFilter}
        allTags={allTags}
        selectedCount={selected.size}
        onBulkStatus={bulkStatus} onBulkDelete={bulkDelete}
        canUndo={canUndo} canRedo={canRedo}
        onUndo={undo} onRedo={redo}
        undoCount={undoCount} redoCount={redoCount}
        history={pHistory}
        onToggleMinimap={()=>setShowMinimap(m=>!m)}
        showMinimap={showMinimap}
      />
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {view==='tree'?(
          <div style={{display:'flex',height:'100%',overflow:'hidden'}}>
            <div ref={treeRef} className="tree-scroll"
              style={{flex:1,overflowY:'auto',overflowX:'auto',padding:'8px 6px 12px',outline:'none'}}
              tabIndex={0}
              onClick={e=>{if(!e.target.closest('.node-row'))setSelected(new Set());}}>
              <div style={{minWidth:440}}>
                <TreeNode node={tree} depth={0} isRoot
                  expanded={expanded} onToggle={toggle} onDelete={del}
                  onCycleStatus={cycleStatus} onPatch={patch}
                  addingTo={addingTo} setAddingTo={setAddingTo} onAdd={add}
                  selected={selected} onSelect={handleSelect}
                  searchQ={searchQ} tagFilter={tagFilter}
                  dragState={dragState}
                  onDragStart={handleDragStart} onDragOver={handleDragOver}
                  onDragEnd={handleDragEnd} onDrop={handleDrop}
                  parentId={null} siblingIndex={0}
                  focusedId={focusedId} notesOpen={notesOpen} onToggleNotes={toggleNotes}
                  PT={PT} addingKind={addingKind} setAddingKind={setAddingKind}/>
              </div>
            </div>
            {showMinimap&&tree&&(
              <Minimap tree={tree} expanded={expanded}
                onJump={jumpToNode}
                onClose={()=>setShowMinimap(false)}/>
            )}
          </div>
        ):(
          <GanttChart tree={tree} onPatchNode={patch}/>
        )}
      </div>
      <div style={{padding:'5px 16px',borderTop:'1px solid #21262d',fontSize:10,color:'#adbac7',display:'flex',gap:14,flexWrap:'wrap',letterSpacing:'.04em',flexShrink:0,alignItems:'center'}}>
        <span style={{color:'#8b949e'}}>↑↓ navigate · A/F add · E expand</span>
        <span>⋮⋮ drag</span>
        <span>multi-select</span>
        <span>📝 notes</span>
        <span style={{marginLeft:'auto',color:'#adbac7',cursor:'pointer'}} onClick={()=>setShowShortcuts(true)}>Shortcuts shortcuts · Ctrl+Z · Ctrl+S</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
